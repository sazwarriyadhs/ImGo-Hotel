version: '3.8'

services:
  # Database PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: imgo-postgres
    environment:
      POSTGRES_DB: imgohotel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: newpassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d imgohotel"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./backend/api-gateway
    container_name: imgo-api-gateway
    ports:
      - "8092:8092"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=newpassword123
      - DB_NAME=imgohotel
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  auth-service:
    build: ./backend/auth-service
    container_name: imgo-auth-service
    ports:
      - "8093:8093"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=newpassword123
      - DB_NAME=imgohotel
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  hotel-service:
    build: ./backend/hotel-service
    container_name: imgo-hotel-service
    ports:
      - "8094:8094"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=newpassword123
      - DB_NAME=imgohotel
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  restaurant-service:
    build: ./backend/restaurant-service
    container_name: imgo-restaurant-service
    ports:
      - "8095:8095"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=newpassword123
      - DB_NAME=imgohotel
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  spa-service:
    build: ./backend/spa-service
    container_name: imgo-spa-service
    ports:
      - "8096:8096"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=newpassword123
      - DB_NAME=imgohotel
      - DB_PORT=5432
