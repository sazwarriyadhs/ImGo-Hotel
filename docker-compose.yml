      postgres:
        condition: service_healthy
    restart: unless-stopped

  ai-service:
    build: ./backend/ai-service
    container_name: imgo-ai-service
    ports:
      - "8098:8098"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
