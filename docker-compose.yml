      - DB_NAME=imgohotel
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  promo-service:
    build: ./backend/promo-service
    container_name: imgo-promo-service
    ports:
      - "8099:8099"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=newpassword123
      - DB_NAME=imgohotel
